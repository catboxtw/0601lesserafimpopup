<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單管理後台 - 852hk.81jp</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 30px 15px;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h2 {
      margin-top: 0;
      font-weight: 600;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    th {
      background-color: #fafafa;
      color: #666;
      font-weight: 500;
    }
    .overdue {
      color: #ff4d4d;
      font-weight: bold;
    }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn-unpaid {
      background-color: #ff4d4d;
      color: white;
    }
    .btn-unpaid:hover {
      background-color: #e03e3e;
    }
    .btn-paid {
      background-color: #2ec4b6;
      color: white;
      cursor: default;
    }
    .loading {
      text-align: center;
      padding: 20px;
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📋 訂單收款核對後台</h2>
  <div id="loading" class="loading">正在從試算表載入最新訂單...</div>
  <table id="orderTable" style="display: none;">
    <thead>
      <tr>
        <th>訂單日期</th>
        <th>訂單編號</th>
        <th>金額</th>
        <th>付款方式</th>
        <th>收款狀態</th>
      </tr>
    </thead>
    <tbody id="orderList">
      <!-- 訂單資料會動態插入到這裡 -->
    </tbody>
  </table>
</div>

<script>
  // ⚠️ 請在此處填入你部署完後最新的 GAS 網址 (後面不需要加 action 等參數)
  var GAS_API_URL = "https://script.google.com/macros/s/AKfycbx8IXQowEmcIAcn4i7lcxQQFs2FrTV5fgno8tujuBD5u2xW0CjMpXn2GtGsP4BMNEQo/exec";

  // 網頁載入時立刻抓取訂單
  window.onload = function() {
    fetchOrders();
  };

  function fetchOrders() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("orderTable").style.display = "none";

    fetch(GAS_API_URL + "?action=getOrders")
      .then(response => response.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("orderTable").style.display = "table";
        
        var tbody = document.getElementById("orderList");
        tbody.innerHTML = "";

        // 將訂單依照時間倒序排列（新訂單在最上面）
        data.reverse();

        data.forEach(order => {
          var tr = document.createElement("tr");

          // 1. 處理日期與 24 小時紅色警示
          var orderDate = new Date(order.date);
          var formattedDate = orderDate.getFullYear() + "-" + 
                              padZero(orderDate.getMonth() + 1) + "-" + 
                              padZero(orderDate.getDate()) + " " + 
                              padZero(orderDate.getHours()) + ":" + 
                              padZero(orderDate.getMinutes());
          
          var tdDate = document.createElement("td");
          tdDate.innerText = formattedDate;
          
          // 判斷是否超過 24 小時且尚未收款
          var now = new Date();
          var timeDiff = now.getTime() - orderDate.getTime();
          var hoursDiff = timeDiff / (1000 * 60 * 60);
          if (hoursDiff > 24 && order.status !== "已收款") {
            tdDate.className = "overdue";
          }
          tr.appendChild(tdDate);

          // 2. 訂單編號
          var tdId = document.createElement("td");
          tdId.innerText = order.id;
          tr.appendChild(tdId);

          // 3. 金額
          var tdAmount = document.createElement("td");
          tdAmount.innerText = "HK$ " + order.amount;
          tr.appendChild(tdAmount);

          // 4. 付款方式
          var tdPay = document.createElement("td");
          tdPay.innerText = order.payMethod || "未選";
          tr.appendChild(tdPay);

          // 5. 按鈕狀態 (未付為紅色按鈕，點擊轉為綠色已收款)
          var tdStatus = document.createElement("td");
          var btn = document.createElement("button");
          btn.className = "btn";
          
          if (order.status === "已收款") {
            btn.innerText = "已收款";
            btn.classList.add("btn-paid");
            btn.disabled = true;
          } else {
            btn.innerText = "未付";
            btn.classList.add("btn-unpaid");
            btn.onclick = function() {
              updateStatus(order.id, btn, tdDate);
            };
          }
          tdStatus.appendChild(btn);
          tr.appendChild(tdStatus);

          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        document.getElementById("loading").innerText = "載入訂單失敗，請確認 GAS 權限或網址是否正確。";
        console.error(err);
      });
  }

  // 變更狀態為已收款
  function updateStatus(orderId, buttonComponent, dateTdComponent) {
    if (!confirm("確定收到訂單 " + orderId + " 的款項了嗎？\n系統將會同步發信給客戶通知已付款。")) return;

    buttonComponent.innerText = "處理中...";
    buttonComponent.disabled = true;

    fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "updatePaymentStatus",
        orderId: orderId
      })
    })
    .then(res => res.json())
    .then(result => {
      if (result.result === "success") {
        buttonComponent.innerText = "已收款";
        buttonComponent.className = "btn btn-paid";
        buttonComponent.onclick = null;
        // 如果原本是紅字，收款後移除紅字樣式
        dateTdComponent.className = "";
      } else {
        alert("更新失敗：" + result.message);
        buttonComponent.innerText = "未付";
        buttonComponent.disabled = false;
      }
    })
    .catch(err => {
      alert("連線失敗，請稍後再試。");
      buttonComponent.innerText = "未付";
      buttonComponent.disabled = false;
      console.error(err);
    });
  }

  function padZero(num) {
    return num < 10 ? "0" + num : num;
  }
</script>

</body>
</html>
